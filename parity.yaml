settings:
  namespace_roots:
    code/src: Src
    code/tests: Tests
  source_extension: ".ts"
  test_suffix: ".test"
  test_extension: ".ts"
  namespace_separator: "."

coverage_xml: parity-coverage.json
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "Vitest sample"
    paths:
      source: "code/src"
      test: "code/tests"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
