name: Parity Sample

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parity:
    name: Install and run Parity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: code/package-lock.json

      - name: Install sample dependencies
        working-directory: code
        run: npm ci

      - name: Generate coverage
        working-directory: code
        run: npm run coverage

      - name: Setup PHP for Parity
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, fileinfo, json

      - name: Configure Parity credentials
        env:
          PARITY_CI_SSH_KEY: ${{ secrets.PARITY_CI_SSH_KEY }}
          PARITY_CI_TOKEN: ${{ secrets.PARITY_CI_TOKEN }}
        run: |
          if [ -n "$PARITY_CI_SSH_KEY" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$PARITY_CI_SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            composer global config repositories.parity vcs git@github.com:testparity/cli.git
          elif [ -n "$PARITY_CI_TOKEN" ]; then
            composer global config github-oauth.github.com "$PARITY_CI_TOKEN"
            composer global config repositories.parity vcs https://github.com/testparity/cli
          else
            echo "::error::Set PARITY_CI_TOKEN or PARITY_CI_SSH_KEY so Composer can install private testparity/cli."
            exit 1
          fi

      - name: Install Parity
        run: |
          composer global require testparity/parity:dev-main --prefer-dist --no-progress --no-interaction
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run Parity
        run: parity check --config=parity.yaml --format=json
